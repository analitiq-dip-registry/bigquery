name: Validate Definitions

on:
  pull_request:
    branches: [main]

jobs:
  # Thin caller: all logic lives in the org-central reusable workflow in the '.github' repo.
  # Job id 'validate' + the reusable workflow's 'validate' job produce the status check
  # 'validate / validate'. Keep this job id stable — the org ruleset
  # 'Require validate check on main' keys on that context.
  # '@main' rolls out reusable-workflow edits to every repo on the next PR run; pin to a
  # tag or SHA instead if you want deliberate rollouts.
  validate:
    uses: analitiq-dip-registry/.github/.github/workflows/validate-definitions.yml@main
    permissions:
      contents: read
